<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZenFox Settings</title>
    <link rel="stylesheet" href="settings.css" />
    <script src="settings.js" defer></script>
  </head>
  <body>
    <main class="settings-page">
      <header class="page-header">
        <div>
          <h1 id="page-title">ZenFox Settings</h1>
          <p id="page-subtitle"></p>
        </div>
      </header>

      <nav class="settings-tabs" role="tablist" aria-label="Settings">
        <button type="button" data-settings-tab="quick-actions" role="tab"></button>
        <button type="button" data-settings-tab="appearance" role="tab"></button>
      </nav>

      <section class="settings-card toolbar-layout-card" data-settings-view="quick-actions">
        <div class="preview-heading">
          <h2 id="preview-title"></h2>
          <p id="preview-hint" class="status-text"></p>
        </div>
        <div class="toolbar-preview-stage">
          <div id="toolbar-preview" class="toolbar-preview">
            <div class="toolbar-preview-row" data-drop-zone="row1">
              <div class="window-controls" aria-hidden="true">
                <span class="window-control close"></span>
                <span class="window-control minimize"></span>
                <span class="window-control maximize"></span>
              </div>
              <div id="row1-actions" class="toolbar-action-list"></div>
            </div>
            <div class="toolbar-preview-row" data-drop-zone="row2">
              <div id="row2-actions" class="toolbar-action-list"></div>
            </div>
          </div>
        </div>
        <div class="available-heading">
          <h2 id="available-title"></h2>
          <p id="available-hint" class="status-text"></p>
        </div>
        <div id="available-actions" class="action-palette" data-drop-zone="available"></div>
      </section>

      <section class="settings-card appearance-view" data-settings-view="appearance" hidden>
        <h2>Sidebery</h2>
        <div id="font-size-row" class="appearance-row"></div>
        <div id="density-row" class="appearance-row"></div>
        <div id="sidebery-background-row" class="appearance-row"></div>
        <div id="normal-foreground-row" class="appearance-row"></div>
        <div id="normal-background-row" class="appearance-row"></div>
        <div id="foreground-row" class="appearance-row"></div>
        <div id="background-row" class="appearance-row"></div>
        <p id="sidebery-status" class="status-text"></p>
      </section>

      <footer class="page-footer">
        <button type="button" id="reset-button"></button>
        <span id="save-status" class="status-text" role="status"></span>
        <button type="button" id="apply-button" class="primary"></button>
      </footer>
    </main>
  </body>
</html>
